<!DOCTYPE html>
<html>

<head>

    <title>BCA ADMINISTRATION</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="header">
    <div class="logo-container">
        <img id="headerLogo" src="logo.png" alt="Church Logo" class="logo">
    </div>
    <h1>BCA Administration</h1>
</div>

<div class="menu" id="navigationMenu" style="display: none;">

    <button onclick="navigateTo('dashboard')">Dashboard</button>
    <button onclick="navigateTo('members')">Members</button>
    <button onclick="navigateTo('budget')">Budget</button>
    <button onclick="navigateTo('income')">Collection</button>
    <button onclick="navigateTo('expense')">Expense</button>
    <button onclick="navigateTo('reports')">Reports</button>
    <button onclick="navigateTo('events')">Events</button>
    <button onclick="navigateTo('bank')">Bank Reconciliation</button>
    <button onclick="navigateTo('assets')" style="background: #2196f3;">🛠️ Assets</button>
    <button onclick="navigateTo('users')" style="background: #d32f2f; color: white;">👤 Users & Roles</button>
    <button onclick="navigateTo('login')" style="background: #666; color: white;">🔓 Logout/Login</button>

</div>

<div id="content"></div>

<script src="js/firebase.js"></script>
<script src="js/utils.js"></script>

<!-- Login System -->
<script src="js/login.js"></script>

<script src="js/dashboard.js"></script>
<script src="js/members.js"></script>
<script src="js/budget.js"></script>
<script src="js/income.js"></script>
<script src="js/expense.js"></script>
<script src="js/reports.js"></script>
<script src="js/events.js"></script>
<!-- Bank Reconciliation -->
<script src="js/bank_enhanced.js"></script>

<!-- Asset Management -->
<script src="js/assets.js"></script>

<!-- Users Management -->
<script src="js/users.js"></script>

<!-- Router System -->
<script>

/* ROUTER CONFIGURATION */
const routes = {
  'dashboard': { handler: treasurerDashboard, requiresAuth: true },
  'members': { handler: loadMembers, requiresAuth: true },
  'budget': { handler: loadBudget, requiresAuth: true },
  'income': { handler: loadIncome, requiresAuth: true },
  'expense': { handler: loadExpense, requiresAuth: true },
  'reports': { handler: loadReports, requiresAuth: true },
  'events': { handler: loadEvents, requiresAuth: true },
  'bank': { handler: loadBankScreen, requiresAuth: true },
  'assets': { handler: loadAssets, requiresAuth: true },
  'users': { handler: loadUsers, requiresAuth: true },
  'login': { handler: showLoginScreen, requiresAuth: false }
};

/* NAVIGATE TO PAGE */
function navigateTo(page) {
  window.location.hash = `#/${page}`;
}

/* ROUTER HANDLER */
function handleRouting() {
  const hash = window.location.hash.slice(2) || 'login'; // Remove #/
  const route = routes[hash];

  if (!route) {
    navigateTo('login');
    return;
  }

  const user = getCurrentUser();
  const navMenu = document.getElementById('navigationMenu');

  // Check authentication
  if (route.requiresAuth && !user) {
    if (navMenu) navMenu.style.display = 'none';
    showLoginScreen();
    return;
  }

  // Show/hide navigation menu if it exists
  if (navMenu) {
    if (user && hash !== 'login') {
      navMenu.style.display = 'block';
    } else {
      navMenu.style.display = 'none';
    }
  }

  // Execute route handler
  try {
    route.handler();
  } catch (error) {
    console.error('Route handler error:', error);
    navigateTo('login');
  }
}

/* INITIALIZE APP */
window.addEventListener('load', function() {
  initializeApp();

  // Handle hash changes
  window.addEventListener('hashchange', handleRouting);

  // Initial route - use setTimeout to ensure DOM is ready
  setTimeout(handleRouting, 100);
});

</script>

</body>
</html>
